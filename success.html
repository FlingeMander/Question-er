<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réponse envoyée - Questionnaire CEVITAL</title>
  <style>
    :root{--primary:#0f766e;--primary-dark:#115e59;--bg:#f4f7f9;--surface:#fff;--text:#12212a;--muted:#64748b;--border:#dbe4ea}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,#ccfbf1 0,#f4f7f9 38%,#f8fafc 100%);display:grid;place-items:center;color:var(--text);padding:22px}
    .card{max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:26px;box-shadow:0 18px 45px rgba(15,23,42,.12);padding:34px;text-align:center}
    .icon{width:72px;height:72px;border-radius:999px;display:grid;place-items:center;margin:0 auto 18px;background:#ccfbf1;color:var(--primary-dark);font-size:38px;font-weight:900}
    h1{margin:0 0 12px;color:var(--primary-dark);font-size:30px;line-height:1.2}
    p{margin:8px 0;color:var(--muted);font-size:16px;line-height:1.6}
    a{display:inline-block;margin-top:20px;text-decoration:none;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-weight:800;border-radius:15px;padding:13px 18px}
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Merci pour votre temps.</h1>
    <p>Votre réponse a été envoyée correctement au responsable du questionnaire.</p>
    <p>Nous vous remercions pour votre participation à cette étude académique.</p>
    <a href="/">Retour au questionnaire</a>
  </main>
</body>
</html>
