<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merci pour votre réponse</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #e6fffb, #f8fafc);
      color: #17202a;
      padding: 20px;
    }
    .card {
      max-width: 620px;
      background: white;
      border: 1px solid #dbe4ea;
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 18px 45px rgba(15, 118, 110, 0.13);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #ccfbf1;
      color: #0f766e;
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 10px;
      color: #115e59;
      font-size: 32px;
    }
    p {
      margin: 0;
      color: #64748b;
      line-height: 1.6;
      font-size: 16px;
    }
    a {
      display: inline-block;
      margin-top: 22px;
      background: #0f766e;
      color: white;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 999px;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Merci pour votre temps</h1>
    <p>Votre réponse a été envoyée avec succès au propriétaire du questionnaire.</p>
    <a href="/">Retour au questionnaire</a>
  </main>
</body>
</html>
